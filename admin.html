<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>삼양ERP - 관리자</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#374151">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .admin-wrap {
      padding: 24px 32px;
    }

    .section-title {
      font-size: 14px;
      font-weight: bold;
      color: #1a4a7a;
      border-left: 4px solid #2980b9;
      padding-left: 10px;
      margin-bottom: 14px;
    }

    .section-block {
      margin-bottom: 36px;
    }

    .account-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      background: white;
      border: 1px solid #c5d9e8;
      border-radius: 6px;
      overflow: hidden;
    }

    .account-table th {
      background: linear-gradient(180deg, #d0e8f8 0%, #b8d8f0 100%);
      color: #1a4a7a;
      font-weight: bold;
      padding: 9px 12px;
      text-align: center;
      border-bottom: 1px solid #99bfda;
    }

    .account-table td {
      padding: 8px 12px;
      border-bottom: 1px solid #e8f0f8;
      text-align: center;
      vertical-align: middle;
    }

    .account-table tr:last-child td { border-bottom: none; }

    .account-table tr:hover td { background: #f0f7ff; }

    .badge-pending {
      background: #fff3cd;
      color: #856404;
      border: 1px solid #ffc107;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: bold;
    }

    .badge-approved {
      background: #d4edda;
      color: #155724;
      border: 1px solid #28a745;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: bold;
    }

    .badge-rejected {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #dc3545;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: bold;
    }

    .badge-admin {
      background: #cce5ff;
      color: #004085;
      border: 1px solid #b8daff;
      padding: 2px 6px;
      border-radius: 10px;
      font-size: 10px;
      margin-left: 4px;
    }

    .btn-approve {
      padding: 4px 12px;
      background: #27ae60;
      color: white;
      border: none;
      border-radius: 3px;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
      font-family: inherit;
      margin-right: 4px;
    }

    .btn-approve:hover { background: #219a52; }

    .btn-reject {
      padding: 4px 12px;
      background: #e74c3c;
      color: white;
      border: none;
      border-radius: 3px;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
      font-family: inherit;
    }

    .btn-reject:hover { background: #c0392b; }

    .empty-row td {
      padding: 24px;
      color: #aaa;
      font-size: 13px;
    }

    .count-badge {
      display: inline-block;
      background: #e74c3c;
      color: white;
      font-size: 11px;
      font-weight: bold;
      padding: 1px 7px;
      border-radius: 10px;
      margin-left: 8px;
      vertical-align: middle;
    }

    .count-badge.zero {
      background: #ccc;
      color: #666;
    }

    .top-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .version-list {
      display: flex;
      flex-direction: column;
      gap: 0;
      border: 1px solid #c5d9e8;
      border-radius: 6px;
      overflow: hidden;
      background: white;
    }

    .version-list.스크롤가능 {
      max-height: 260px;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .version-list.스크롤가능::-webkit-scrollbar { width: 6px; }
    .version-list.스크롤가능::-webkit-scrollbar-track { background: #f0f4f8; }
    .version-list.스크롤가능::-webkit-scrollbar-thumb { background: #b0c8e0; border-radius: 3px; }

    .version-item {
      display: flex;
      align-items: flex-start;
      gap: 0;
      border-bottom: 1px solid #e8f0f8;
      font-size: 13px;
    }

    .version-item:last-child { border-bottom: none; }

    .version-item:first-child .version-tag { background: #1a4a7a; color: white; }

    .version-tag {
      background: #d0e8f8;
      color: #1a4a7a;
      font-weight: bold;
      font-size: 12px;
      padding: 10px 14px;
      min-width: 76px;
      text-align: center;
      letter-spacing: 0.5px;
      flex-shrink: 0;
    }

    .version-date {
      padding: 10px 14px;
      color: #888;
      font-size: 12px;
      min-width: 90px;
      flex-shrink: 0;
    }

    .version-desc {
      padding: 10px 14px;
      color: #374151;
      line-height: 1.5;
      flex: 1;
    }

    .version-current {
      display: inline-block;
      background: #F97316;
      color: white;
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 4px;
      margin-left: 6px;
      vertical-align: middle;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <!-- 사이드바 -->
  <div class="사이드바오버레이" id="사이드바오버레이" onclick="사이드바닫기()"></div>
  <div class="사이드바" id="사이드바">
    <div class="사이드바헤더"><span>접속 현황</span><button onclick="사이드바닫기()">✕</button></div>
    <div class="사이드바섹션제목">현재 접속자</div>
    <div id="접속자목록"></div>
  </div>

  <!-- 헤더 -->
  <div class="메뉴바">
    <div class="햄버거뱃지래퍼">
      <button class="햄버거버튼" onclick="사이드바열기()" title="접속자 현황">
        <span></span><span></span><span></span>
      </button>
      <span id="접속자수뱃지"></span>
    </div>
    <div class="메뉴바-좌">
      <span id="header-title"></span>
      <span class="메뉴바-부제" id="header-sub"></span>
    </div>
    <div class="메뉴바-우">
      <span id="user-info" style="font-size:13px; opacity:0.9;"></span>
      <button class="버튼 작게" style="margin-left:12px;" onclick="location.href='main.html'">메인으로</button>
      <button class="버튼 작게" style="margin-left:6px;" onclick="로그아웃()">로그아웃</button>
    </div>
  </div>

  <!-- 확인 모달 -->
  <div id="확인모달_오버레이" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:9999; align-items:center; justify-content:center;">
    <div style="background:#fff; border-radius:8px; padding:24px; min-width:280px; max-width:400px; box-shadow:0 4px 20px rgba(0,0,0,0.3);">
      <div id="확인모달_메시지" style="margin-bottom:20px; font-size:14px; line-height:1.6; white-space:pre-line;"></div>
      <div style="display:flex; gap:8px; justify-content:flex-end;">
        <button class="버튼 회색" onclick="확인모달닫기()">취소</button>
        <button class="버튼 파랑" id="확인모달_확인버튼">확인</button>
      </div>
    </div>
  </div>

  <div class="admin-wrap">

    <!-- 버전 히스토리 -->
    <div class="section-block">
      <div class="section-title">
        시스템 버전 히스토리
      </div>
      <div class="version-list" id="version-list">
        <div class="version-item">
          <div class="version-tag">-</div>
          <div class="version-date">-</div>
          <div class="version-desc">불러오는 중...</div>
        </div>
      </div>
    </div>

    <!-- 공지 관리 -->
    <div class="section-block">
      <div class="section-title">공지 관리</div>
      <div style="display:flex;gap:8px;align-items:flex-start;">
        <textarea id="공지입력" rows="2"
          style="flex:1;border:1px solid #c5d9e8;border-radius:6px;padding:10px 12px;font-size:13px;font-family:inherit;resize:vertical;line-height:1.6;"
          placeholder="전체 화면 상단에 표시될 공지 내용을 입력하세요."></textarea>
        <button class="버튼 파랑" style="height:60px;padding:0 18px;font-size:13px;" onclick="공지저장()">저장</button>
      </div>
      <div style="margin-top:6px;font-size:11px;color:#888;">※ 저장 즉시 전체 페이지 상단 스크롤 공지에 반영됩니다. 빈칸으로 저장하면 공지가 사라집니다.</div>
    </div>

    <!-- 승인 대기 -->
    <div class="section-block">
      <div class="top-actions">
        <div class="section-title">
          승인 대기 계정
          <span class="count-badge zero" id="pending-count">0</span>
        </div>
        <button class="버튼 작게" onclick="목록새로고침()">새로고침</button>
      </div>
      <table class="account-table">
        <thead>
          <tr>
            <th>사원명</th>
            <th>직급</th>
            <th>신청일시</th>
            <th>조치</th>
          </tr>
        </thead>
        <tbody id="pending-tbody">
          <tr class="empty-row"><td colspan="4">승인 대기 중인 계정이 없습니다.</td></tr>
        </tbody>
      </table>
    </div>

    <!-- 전체 계정 목록 -->
    <div class="section-block">
      <div class="section-title">전체 계정 목록</div>
      <table class="account-table">
        <thead>
          <tr>
            <th>사원명</th>
            <th>직급</th>
            <th>상태</th>
            <th>신청일시</th>
            <th>승인일시</th>
            <th>조치</th>
          </tr>
        </thead>
        <tbody id="all-tbody">
          <tr class="empty-row"><td colspan="6">계정 정보를 불러오는 중...</td></tr>
        </tbody>
      </table>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/presence.js"></script>
  <script src="js/chat.js"></script>
  <script>
    세션체크();
    관리자체크();
    접속자패널초기화();
    채팅초기화();

    async function 공지로드() {
      var { data } = await 수파베이스.from('설정').select('값').eq('키', '공지문구').maybeSingle();
      if (data) document.getElementById('공지입력').value = data.값 || '';
    }

    async function 공지저장() {
      var 내용 = document.getElementById('공지입력').value.trim();
      var { error } = await 수파베이스.from('설정')
        .upsert({ 키: '공지문구', 값: 내용, 수정일시: new Date().toISOString() }, { onConflict: '키' });
      if (error) { _알림표시('저장 실패: ' + error.message, '오류'); return; }
      _알림표시('공지가 저장되었습니다.', '성공');
    }

    공지로드();

    document.getElementById('header-title').innerHTML = APP_CONFIG.시스템명.replace('ERP', '<span style="color:#F97316; font-style:italic;">ERP</span>');
    document.getElementById('header-sub').textContent = APP_CONFIG.부제;
    document.title = APP_CONFIG.시스템명 + ' - 관리자';
    var 세션 = 현재세션();
    if (세션) document.getElementById('user-info').textContent = 세션.직급 + ' ' + 세션.사원명 + ' [관리자]';

    var _알림타이머 = null;
    function _알림표시(메시지, 종류) {
      var el = document.getElementById('admin-알림') || (function() {
        var d = document.createElement('div');
        d.id = 'admin-알림';
        d.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:10000;padding:10px 24px;border-radius:6px;font-size:14px;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,0.15);display:none;';
        document.body.appendChild(d);
        return d;
      })();
      el.textContent = 메시지;
      el.style.background = 종류 === '성공' ? '#d4edda' : '#f8d7da';
      el.style.color = 종류 === '성공' ? '#155724' : '#721c24';
      el.style.display = 'block';
      clearTimeout(_알림타이머);
      _알림타이머 = setTimeout(function() { el.style.display = 'none'; }, 3000);
    }

    function 확인모달표시(메시지, 콜백) {
      document.getElementById('확인모달_메시지').textContent = 메시지;
      var 버튼 = document.getElementById('확인모달_확인버튼');
      버튼.onclick = function() { 확인모달닫기(); 콜백(); };
      document.getElementById('확인모달_오버레이').style.display = 'flex';
    }

    function 확인모달닫기() {
      document.getElementById('확인모달_오버레이').style.display = 'none';
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') 확인모달닫기();
    });

    function _날짜형식(iso) {
      if (!iso) return '-';
      var d = new Date(iso);
      var pad = function(n) { return n < 10 ? '0' + n : '' + n; };
      return (d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate())
        + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes()));
    }

    function _상태뱃지(상태) {
      var map = { pending: '대기중', approved: '승인', rejected: '거부' };
      var cls = { pending: 'badge-pending', approved: 'badge-approved', rejected: 'badge-rejected' };
      return '<span class="' + (cls[상태] || '') + '">' + (map[상태] || 상태) + '</span>';
    }

    async function 목록새로고침() {
      var 목록 = await 전체계정목록();

      var 대기목록 = 목록.filter(function(a) { return a['상태'] === 'pending'; });
      var cnt = document.getElementById('pending-count');
      cnt.textContent = 대기목록.length;
      cnt.className = 'count-badge' + (대기목록.length > 0 ? '' : ' zero');

      /* 승인 대기 테이블 */
      var pBody = document.getElementById('pending-tbody');
      if (대기목록.length === 0) {
        pBody.innerHTML = '<tr class="empty-row"><td colspan="4">승인 대기 중인 계정이 없습니다.</td></tr>';
      } else {
        pBody.innerHTML = 대기목록.map(function(a) {
          return '<tr>'
            + '<td style="font-weight:bold;">' + a['사원명'] + '</td>'
            + '<td>' + a['직급'] + '</td>'
            + '<td>' + _날짜형식(a['created_at']) + '</td>'
            + '<td>'
            +   '<button class="btn-approve" onclick="승인처리(' + a.id + ')">승인</button>'
            +   '<button class="btn-reject"  onclick="거부처리(' + a.id + ')">거부</button>'
            + '</td>'
            + '</tr>';
        }).join('');
      }

      /* 전체 계정 테이블 */
      var 내세션 = 현재세션();
      var aBody = document.getElementById('all-tbody');
      if (목록.length === 0) {
        aBody.innerHTML = '<tr class="empty-row"><td colspan="6">등록된 계정이 없습니다.</td></tr>';
      } else {
        aBody.innerHTML = 목록.map(function(a) {
          var 이름셀 = a['사원명'] + (a['관리자여부'] ? '<span class="badge-admin">관리자</span>' : '');
          var 나자신 = 내세션 && 내세션.사원명 === a['사원명'];
          var 조치셀 = 나자신
            ? '<span style="font-size:11px; color:#aaa;">본인</span>'
            : '<button class="btn-reject" onclick="계정삭제처리(' + a.id + ', \'' + a['사원명'] + '\')">삭제</button>';
          return '<tr>'
            + '<td style="font-weight:bold;">' + 이름셀 + '</td>'
            + '<td>' + a['직급'] + '</td>'
            + '<td>' + _상태뱃지(a['상태']) + '</td>'
            + '<td>' + _날짜형식(a['created_at']) + '</td>'
            + '<td>' + _날짜형식(a['승인일시']) + '</td>'
            + '<td>' + 조치셀 + '</td>'
            + '</tr>';
        }).join('');
      }
    }

    async function 승인처리(id) {
      var 결과 = await 계정승인(id);
      if (!결과.성공) { _알림표시('승인 실패: ' + 결과.메시지, '오류'); return; }
      _알림표시('승인되었습니다.', '성공');
      목록새로고침();
    }

    async function 거부처리(id) {
      확인모달표시('이 계정을 거부하시겠습니까?', async function() {
        var 결과 = await 계정거부(id);
        if (!결과.성공) { _알림표시('거부 실패: ' + 결과.메시지, '오류'); return; }
        _알림표시('거부 처리되었습니다.', '성공');
        목록새로고침();
      });
    }

    async function 계정삭제처리(id, 사원명) {
      확인모달표시(사원명 + ' 계정을 완전히 삭제하시겠습니까?\n되돌릴 수 없습니다.', async function() {
        var 결과 = await 계정삭제(id);
        if (!결과.성공) { _알림표시('삭제 실패: ' + 결과.메시지, '오류'); return; }
        _알림표시(사원명 + ' 계정이 삭제되었습니다.', '성공');
        목록새로고침();
      });
    }

    // 버전 히스토리 렌더링
    (function() {
      var list = document.getElementById('version-list');
      var 히스토리 = APP_CONFIG.버전히스토리 || [];
      if (히스토리.length === 0) {
        list.innerHTML = '<div class="version-item"><div class="version-desc" style="padding:16px;color:#aaa;">버전 히스토리가 없습니다.</div></div>';
        return;
      }
      list.innerHTML = 히스토리.map(function(v, i) {
        var 현재표시 = i === 0 ? '<span class="version-current">현재</span>' : '';
        return '<div class="version-item">'
          + '<div class="version-tag">' + v.버전 + 현재표시 + '</div>'
          + '<div class="version-date">' + (v.날짜 || '') + '</div>'
          + '<div class="version-desc">' + v.내용 + '</div>'
          + '</div>';
      }).join('');
      if (히스토리.length > 5) list.classList.add('스크롤가능');
    })();

    // 초기 로드
    목록새로고침();
  </script>
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>
