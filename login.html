<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>삼양ERP - 로그인</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(160deg, #1a4a7a 0%, #2980b9 35%, #5dade2 65%, #85c1e9 85%, #a8d8ea 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: '맑은 고딕', 'Malgun Gothic', Arial, sans-serif;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 38%;
      background: linear-gradient(to top, #3d6b2a 0%, #5a8f3c 40%, transparent 100%);
      opacity: 0.55;
    }

    body::after {
      content: '';
      position: absolute;
      bottom: 34%; left: 0; right: 0;
      height: 6%;
      background: linear-gradient(to right, #4a7a30 0%, #6aaa40 30%, #5a8f3c 60%, #4a7a30 100%);
      opacity: 0.4;
      border-radius: 50% 60% 0 0;
    }

    .login-wrap {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 0;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 12px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.35);
      backdrop-filter: blur(6px);
      overflow: hidden;
      min-width: 620px;
    }

    .brand-area {
      padding: 50px 40px;
      color: white;
      flex: 1;
      min-width: 240px;
    }

    .brand-logo {
      font-size: 13px;
      letter-spacing: 2px;
      opacity: 0.85;
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    .brand-main {
      font-size: 38px;
      font-weight: 900;
      line-height: 1.15;
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
      letter-spacing: -1px;
    }

    .brand-main span { color: #ffe066; font-style: italic; }

    .brand-sub {
      font-size: 15px;
      margin-top: 10px;
      opacity: 0.85;
      letter-spacing: 1px;
    }

    .divider {
      width: 1px;
      height: 220px;
      background: rgba(255,255,255,0.3);
    }

    .form-area {
      padding: 40px 36px;
      min-width: 280px;
      background: rgba(255,255,255,0.92);
    }

    .form-title {
      font-size: 15px;
      font-weight: bold;
      color: #1a4a7a;
      margin-bottom: 22px;
      text-align: center;
      letter-spacing: 1px;
    }

    .field-row {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
      gap: 10px;
    }

    .field-row label {
      width: 68px;
      font-size: 13px;
      color: #444;
      text-align: right;
      flex-shrink: 0;
    }

    .field-row input, .field-row select {
      flex: 1;
      height: 32px;
      border: 1px solid #b0c4d8;
      border-radius: 3px;
      padding: 0 10px;
      font-size: 13px;
      font-family: inherit;
      background: #f5faff;
      outline: none;
      transition: border-color 0.2s;
    }

    .field-row input:focus, .field-row select:focus {
      border-color: #2980b9;
      background: #fff;
    }

    .company-name {
      flex: 1;
      font-size: 13px;
      color: #333;
      padding: 0 4px;
    }

    .btn-main-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-left: 10px;
    }

    .btn-login {
      width: 80px;
      height: 46px;
      background: linear-gradient(180deg, #4a9fd4 0%, #1a6aad 100%);
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 3px 8px rgba(0,0,0,0.2);
      font-family: inherit;
      letter-spacing: 1px;
    }

    .btn-login:hover { background: linear-gradient(180deg, #5ab0e4 0%, #2a7abe 100%); }
    .btn-login:active { transform: translateY(1px); }
    .btn-login:disabled { opacity: 0.6; cursor: default; }

    .btn-cancel {
      width: 80px;
      height: 38px;
      background: linear-gradient(180deg, #e8e8e8 0%, #c8c8c8 100%);
      color: #444;
      border: none;
      border-radius: 5px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      font-family: inherit;
    }

    .btn-cancel:hover { background: linear-gradient(180deg, #f0f0f0 0%, #d8d8d8 100%); }

    .btn-bottom-group {
      display: flex;
      gap: 6px;
      margin-top: 16px;
      justify-content: flex-end;
    }

    .btn-sm {
      padding: 5px 12px;
      font-size: 12px;
      border: 1px solid #b0c4d8;
      border-radius: 3px;
      background: linear-gradient(180deg, #f5faff 0%, #e0eef8 100%);
      color: #1a4a7a;
      cursor: pointer;
      font-family: inherit;
      font-weight: bold;
    }

    .btn-sm:hover { background: linear-gradient(180deg, #e0eef8 0%, #c5ddf0 100%); }

    .form-and-btn {
      display: flex;
      align-items: center;
      gap: 0;
    }

    .fields { flex: 1; }

    .error-msg {
      font-size: 12px;
      color: #e74c3c;
      text-align: center;
      margin-top: 6px;
      min-height: 18px;
    }

    .success-msg {
      font-size: 12px;
      color: #27ae60;
      text-align: center;
      margin-top: 6px;
      min-height: 18px;
    }

    /* 모달 */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active { display: flex; }

    .modal {
      background: white;
      border-radius: 8px;
      padding: 30px 28px;
      width: 340px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }

    .modal h3 {
      font-size: 15px;
      color: #1a4a7a;
      margin-bottom: 6px;
      text-align: center;
    }

    .modal .modal-desc {
      font-size: 12px;
      color: #888;
      text-align: center;
      margin-bottom: 18px;
    }

    .modal .field-row { margin-bottom: 10px; }

    .modal-btns {
      display: flex;
      gap: 8px;
      margin-top: 20px;
      justify-content: center;
    }

    .modal-btns button {
      padding: 7px 22px;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      font-family: inherit;
    }

    .btn-confirm { background: #2980b9; color: white; }
    .btn-confirm:hover { background: #1a6aad; }
    .btn-confirm:disabled { opacity: 0.6; cursor: default; }
    .btn-close-modal { background: #e0e0e0; color: #444; }
    .btn-close-modal:hover { background: #d0d0d0; }

    .modal .error-msg { margin-top: 8px; }

    /* 승인 대기 안내 박스 */
    .pending-box {
      display: none;
      background: #e8f5e9;
      border: 1px solid #a5d6a7;
      border-radius: 6px;
      padding: 16px 18px;
      text-align: center;
      margin-top: 12px;
    }

    .pending-box p { font-size: 13px; color: #2e7d32; line-height: 1.6; }

    .version-badge {
      position: absolute;
      bottom: 14px;
      left: 20px;
      color: rgba(255,255,255,0.92);
      font-size: 14px;
      font-weight: bold;
      z-index: 5;
      letter-spacing: 0.5px;
    }

    .copyright {
      position: absolute;
      bottom: 14px;
      width: 100%;
      text-align: center;
      color: rgba(255,255,255,0.6);
      font-size: 11px;
      z-index: 5;
    }
  </style>
</head>
<body>

  <div class="login-wrap">

    <!-- 왼쪽: 브랜드 -->
    <div class="brand-area">
      <div class="brand-logo" id="brand-logo"></div>
      <div class="brand-main" id="brand-main"></div>
      <div class="brand-sub" id="brand-sub"></div>
    </div>

    <div class="divider"></div>

    <!-- 오른쪽: 로그인 폼 -->
    <div class="form-area">
      <div class="form-title">로 그 인</div>

      <div class="form-and-btn">
        <div class="fields">
          <div class="field-row">
            <label>회 사 명</label>
            <span class="company-name" id="company-name"></span>
          </div>
          <div class="field-row">
            <label>사 원 명</label>
            <input type="text" id="inp-name" placeholder="사원명 입력" autocomplete="off">
          </div>
          <div class="field-row">
            <label>사원암호</label>
            <input type="password" id="inp-pw" placeholder="암호 입력" onkeydown="엔터로그인(event)">
          </div>
        </div>

        <div class="btn-main-group">
          <button class="btn-login" id="btn-login" onclick="로그인()">로그인</button>
          <button class="btn-cancel" onclick="초기화()">취 소</button>
        </div>
      </div>

      <div class="error-msg" id="error-msg"></div>

      <div class="btn-bottom-group">
        <button class="btn-sm" onclick="계정신청모달열기()">암호생성 ›</button>
        <button class="btn-sm" onclick="암호변경모달열기()">암호변경 ›</button>
      </div>
      <div style="text-align:right; margin-top:8px; font-size:11px; color:#999;" id="admin-info"></div>
    </div>
  </div>

  <!-- 계정신청 모달 -->
  <div class="modal-overlay" id="modal-create">
    <div class="modal">
      <h3>암호 생성</h3>
      <p class="modal-desc">관리자 승인 후 로그인이 가능합니다.</p>
      <div class="field-row">
        <label>사원명</label>
        <input type="text" id="create-name" placeholder="실명 입력" autocomplete="off">
      </div>
      <div class="field-row">
        <label>암호</label>
        <input type="password" id="create-pw1" placeholder="4자 이상">
      </div>
      <div class="field-row">
        <label>암호확인</label>
        <input type="password" id="create-pw2" placeholder="암호 재입력" onkeydown="엔터계정신청(event)">
      </div>
      <div class="error-msg" id="create-error"></div>

      <!-- 신청 완료 안내 -->
      <div class="pending-box" id="pending-box">
        <p>암호 생성이 완료되었습니다.<br>관리자 승인 후 로그인해주세요.</p>
        <div class="modal-btns" style="margin-top:14px;">
          <button class="btn-confirm" onclick="모달닫기('modal-create')">확인</button>
        </div>
      </div>

      <div class="modal-btns" id="create-btns">
        <button class="btn-confirm" id="btn-create-submit" onclick="계정신청제출()">생성</button>
        <button class="btn-close-modal" onclick="모달닫기('modal-create')">취소</button>
      </div>
    </div>
  </div>

  <!-- 암호변경 모달 -->
  <div class="modal-overlay" id="modal-change">
    <div class="modal">
      <h3>암호 변경</h3>
      <p class="modal-desc">현재 암호 확인 후 변경됩니다.</p>
      <div class="field-row">
        <label>사원명</label>
        <input type="text" id="change-name" placeholder="사원명 입력">
      </div>
      <div class="field-row">
        <label>현재 암호</label>
        <input type="password" id="change-old" placeholder="현재 암호">
      </div>
      <div class="field-row">
        <label>새 암호</label>
        <input type="password" id="change-new1" placeholder="새 암호 (4자 이상)">
      </div>
      <div class="field-row">
        <label>암호확인</label>
        <input type="password" id="change-new2" placeholder="새 암호 재입력" onkeydown="엔터암호변경(event)">
      </div>
      <div class="error-msg" id="change-error"></div>
      <div class="modal-btns">
        <button class="btn-confirm" id="btn-change-submit" onclick="암호변경()">변경</button>
        <button class="btn-close-modal" onclick="모달닫기('modal-change')">취소</button>
      </div>
    </div>
  </div>

  <div class="version-badge" id="version-badge"></div>
  <div class="copyright" id="copyright"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // config 값 적용
    document.getElementById('brand-logo').textContent = 'Smart ERP System';
    document.getElementById('brand-main').innerHTML = APP_CONFIG.시스템명.replace('ERP', '<span>ERP</span>');
    document.getElementById('brand-sub').textContent = APP_CONFIG.부제;
    document.getElementById('company-name').textContent = APP_CONFIG.회사명;
    document.getElementById('admin-info').textContent = '서버관리자 : ' + APP_CONFIG.관리자;
    document.getElementById('copyright').textContent = 'Copyright (C) ' + APP_CONFIG.회사명 + '. All Rights Reserved.';
    document.getElementById('version-badge').textContent = APP_CONFIG.버전;
    document.title = APP_CONFIG.시스템명 + ' - 로그인';

    if (현재세션()) location.href = 'main.html';

    function 에러표시(메시지) {
      document.getElementById('error-msg').textContent = 메시지;
    }

    function 엔터로그인(e) { if (e.key === 'Enter') 로그인(); }

    async function 로그인() {
      var 이름 = document.getElementById('inp-name').value.trim();
      var 암호 = document.getElementById('inp-pw').value;

      if (!이름) { 에러표시('사원명을 입력해주세요.'); return; }
      if (!암호) { 에러표시('사원암호를 입력해주세요.'); return; }

      var btn = document.getElementById('btn-login');
      btn.disabled = true;
      btn.textContent = '확인중';
      에러표시('');

      var 결과 = await 로그인시도(이름, 암호);
      btn.disabled = false;
      btn.textContent = '로그인';

      if (!결과.성공) { 에러표시(결과.메시지); return; }

      로그인처리(결과.사용자);
      location.href = 결과.사용자['관리자여부'] ? 'admin.html' : 'main.html';
    }

    function 초기화() {
      document.getElementById('inp-name').value = '';
      document.getElementById('inp-pw').value = '';
      에러표시('');
      document.getElementById('inp-name').focus();
    }

    /* 모달 */
    function 계정신청모달열기() {
      document.getElementById('create-name').value = '';
      document.getElementById('create-pw1').value  = '';
      document.getElementById('create-pw2').value  = '';
      document.getElementById('create-error').textContent = '';
      document.getElementById('pending-box').style.display = 'none';
      document.getElementById('create-btns').style.display = 'flex';
      document.getElementById('modal-create').classList.add('active');
      document.getElementById('create-name').focus();
    }

    function 암호변경모달열기() {
      document.getElementById('change-name').value  = '';
      document.getElementById('change-old').value   = '';
      document.getElementById('change-new1').value  = '';
      document.getElementById('change-new2').value  = '';
      document.getElementById('change-error').textContent = '';
      document.getElementById('modal-change').classList.add('active');
      document.getElementById('change-name').focus();
    }

    function 모달닫기(id) {
      document.getElementById(id).classList.remove('active');
    }

    function 엔터계정신청(e) { if (e.key === 'Enter') 계정신청제출(); }
    function 엔터암호변경(e)  { if (e.key === 'Enter') 암호변경(); }

    async function 계정신청제출() {
      var 이름  = document.getElementById('create-name').value.trim();
      var pw1   = document.getElementById('create-pw1').value;
      var pw2   = document.getElementById('create-pw2').value;
      var 에러  = document.getElementById('create-error');

      if (!이름) { 에러.textContent = '사원명을 입력해주세요.'; return; }
      if (!pw1 || pw1.length < 4) { 에러.textContent = '암호는 4자 이상 입력해주세요.'; return; }
      if (pw1 !== pw2) { 에러.textContent = '암호가 일치하지 않습니다.'; return; }

      var btn = document.getElementById('btn-create-submit');
      btn.disabled = true;
      btn.textContent = '생성중';
      에러.textContent = '';

      var 결과 = await 계정신청(이름, pw1);
      btn.disabled = false;
      btn.textContent = '생성';

      if (!결과.성공) { 에러.textContent = 결과.메시지; return; }

      document.getElementById('create-btns').style.display = 'none';
      document.getElementById('pending-box').style.display = 'block';
    }

    async function 암호변경() {
      var 이름    = document.getElementById('change-name').value.trim();
      var 현재암호 = document.getElementById('change-old').value;
      var pw1     = document.getElementById('change-new1').value;
      var pw2     = document.getElementById('change-new2').value;
      var 에러    = document.getElementById('change-error');

      if (!이름)    { 에러.textContent = '사원명을 입력해주세요.'; return; }
      if (!현재암호) { 에러.textContent = '현재 암호를 입력해주세요.'; return; }
      if (!pw1 || pw1.length < 4) { 에러.textContent = '새 암호는 4자 이상이어야 합니다.'; return; }
      if (pw1 !== pw2) { 에러.textContent = '새 암호가 일치하지 않습니다.'; return; }

      var btn = document.getElementById('btn-change-submit');
      btn.disabled = true;
      btn.textContent = '변경중';
      에러.textContent = '';

      var 결과 = await 암호변경처리(이름, 현재암호, pw1);
      btn.disabled = false;
      btn.textContent = '변경';

      if (!결과.성공) { 에러.textContent = 결과.메시지; return; }

      모달닫기('modal-change');
      에러표시('✅ 암호가 변경되었습니다.');
    }
  </script>
</body>
</html>
