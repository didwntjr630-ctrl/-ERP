<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>삼양ERP - 로그인</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#374151">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #111827;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: '맑은 고딕', 'Malgun Gothic', Arial, sans-serif;
      position: relative;
      overflow: hidden;
    }

    /* 배경 장식 */
    body::before {
      content: '';
      position: absolute;
      top: -200px; right: -200px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(249,115,22,0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    body::after {
      content: '';
      position: absolute;
      bottom: -150px; left: -150px;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(249,115,22,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    /* 로그인 카드 */
    .login-card {
      position: relative;
      z-index: 10;
      background: white;
      border-radius: 16px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.45);
      overflow: hidden;
      width: 420px;
      max-width: 95vw;
    }

    /* 카드 상단 브랜드 헤더 */
    .card-header {
      background: #374151;
      padding: 32px 36px 28px;
      text-align: center;
      border-bottom: 4px solid #F97316;
    }

    .brand-label {
      font-size: 10px;
      letter-spacing: 3px;
      color: #9CA3AF;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .brand-name {
      font-size: 32px;
      font-weight: 900;
      color: white;
      letter-spacing: -1px;
      line-height: 1;
    }

    .brand-name span {
      color: #F97316;
      font-style: italic;
    }

    .brand-sub {
      font-size: 11px;
      color: #9CA3AF;
      margin-top: 8px;
      letter-spacing: 2px;
    }

    /* 폼 영역 */
    .card-body {
      padding: 32px 36px 28px;
    }

    .form-section-title {
      font-size: 13px;
      font-weight: 700;
      color: #374151;
      margin-bottom: 20px;
      text-align: center;
      letter-spacing: 1px;
    }

    .field-group {
      margin-bottom: 14px;
    }

    .field-group label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: #6B7280;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    .field-group .company-val {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #374151;
      padding: 8px 0 4px;
    }

    .field-group input {
      width: 100%;
      height: 40px;
      border: 1.5px solid #E5E7EB;
      border-radius: 8px;
      padding: 0 14px;
      font-size: 14px;
      font-family: inherit;
      color: #111827;
      background: #F9FAFB;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    .field-group input:focus {
      border-color: #F97316;
      background: white;
      box-shadow: 0 0 0 3px rgba(249,115,22,0.12);
    }

    .btn-login {
      width: 100%;
      height: 44px;
      background: linear-gradient(180deg, #FB923C 0%, #F97316 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(249,115,22,0.4);
      font-family: inherit;
      letter-spacing: 2px;
      margin-top: 20px;
      transition: all 0.15s;
    }

    .btn-login:hover {
      background: linear-gradient(180deg, #F97316 0%, #EA6C0A 100%);
      box-shadow: 0 6px 18px rgba(249,115,22,0.5);
      transform: translateY(-1px);
    }

    .btn-login:active { transform: translateY(0); }
    .btn-login:disabled { opacity: 0.6; cursor: default; transform: none; }

    .error-msg {
      font-size: 12px;
      color: #EF4444;
      text-align: center;
      margin-top: 10px;
      min-height: 18px;
      font-weight: 500;
    }

    /* 하단 보조 버튼 */
    .card-footer {
      padding: 14px 36px 24px;
      display: flex;
      gap: 8px;
      justify-content: center;
      border-top: 1px solid #F3F4F6;
      background: #F9FAFB;
    }

    .btn-sm {
      padding: 6px 16px;
      font-size: 12px;
      border: 1px solid #E5E7EB;
      border-radius: 6px;
      background: white;
      color: #6B7280;
      cursor: pointer;
      font-family: inherit;
      font-weight: 600;
      transition: all 0.15s;
    }

    .btn-sm:hover {
      border-color: #F97316;
      color: #F97316;
      background: #FFF7ED;
    }

    .version-info {
      font-size: 10px;
      color: #D1D5DB;
      text-align: center;
      margin-top: 10px;
    }

    /* 초기화 버튼 (텍스트) */
    .btn-reset {
      background: none;
      border: none;
      color: #9CA3AF;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
      text-decoration: underline;
      text-underline-offset: 2px;
      margin-top: 6px;
      display: block;
      text-align: center;
      width: 100%;
    }

    .btn-reset:hover { color: #6B7280; }

    /* 모달 */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(3px);
    }

    .modal-overlay.active { display: flex; }

    .modal {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      width: 360px;
      max-width: 95vw;
      box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    }

    .modal-header {
      background: #374151;
      border-bottom: 3px solid #F97316;
      padding: 14px 20px;
      text-align: center;
    }

    .modal-header h3 {
      font-size: 14px;
      color: white;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .modal-body {
      padding: 24px 24px 8px;
    }

    .modal-desc {
      font-size: 12px;
      color: #9CA3AF;
      text-align: center;
      margin-bottom: 18px;
    }

    .modal-body .field-group {
      margin-bottom: 12px;
    }

    .modal-btns {
      display: flex;
      gap: 8px;
      padding: 16px 24px 20px;
      justify-content: center;
    }

    .btn-confirm {
      padding: 8px 28px;
      border: none;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      background: linear-gradient(180deg, #FB923C 0%, #F97316 100%);
      color: white;
      box-shadow: 0 2px 6px rgba(249,115,22,0.35);
      transition: all 0.15s;
    }

    .btn-confirm:hover {
      background: linear-gradient(180deg, #F97316 0%, #EA6C0A 100%);
      transform: translateY(-1px);
    }

    .btn-confirm:disabled { opacity: 0.6; cursor: default; transform: none; }

    .btn-close-modal {
      padding: 8px 22px;
      border: 1px solid #E5E7EB;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      background: white;
      color: #6B7280;
      transition: all 0.15s;
    }

    .btn-close-modal:hover {
      background: #F9FAFB;
      border-color: #9CA3AF;
    }

    /* 승인 대기 안내 박스 */
    .pending-box {
      display: none;
      background: #ECFDF5;
      border: 1px solid #A7F3D0;
      border-radius: 8px;
      padding: 16px 18px;
      text-align: center;
      margin-top: 12px;
    }

    .pending-box p { font-size: 13px; color: #065F46; line-height: 1.7; }

    .modal .error-msg { margin-top: 6px; margin-bottom: 2px; }

    /* 하단 정보 */
    .page-footer {
      position: fixed;
      bottom: 16px;
      width: 100%;
      text-align: center;
      color: rgba(255,255,255,0.3);
      font-size: 11px;
      z-index: 5;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <!-- 로그인 카드 -->
  <div class="login-card">

    <!-- 브랜드 헤더 -->
    <div class="card-header">
      <div class="brand-label">Smart ERP System</div>
      <div class="brand-name" id="brand-main"></div>
      <div class="brand-sub" id="brand-sub"></div>
    </div>

    <!-- 로그인 폼 -->
    <div class="card-body">
      <div class="form-section-title">로 그 인</div>

      <div class="field-group">
        <label>회사명</label>
        <span class="company-val" id="company-name"></span>
      </div>

      <div class="field-group">
        <label>사원명</label>
        <input type="text" id="inp-name" placeholder="사원명 입력" autocomplete="off">
      </div>

      <div class="field-group">
        <label>사원암호</label>
        <input type="password" id="inp-pw" placeholder="암호 입력" onkeydown="엔터로그인(event)">
      </div>

      <button class="btn-login" id="btn-login" onclick="로그인()">로 그 인</button>
      <button class="btn-reset" onclick="초기화()">초기화</button>

      <div class="error-msg" id="error-msg"></div>
    </div>

    <!-- 하단 보조 -->
    <div class="card-footer">
      <button class="btn-sm" onclick="계정신청모달열기()">암호 생성</button>
      <button class="btn-sm" onclick="암호변경모달열기()">암호 변경</button>
      <div style="font-size:11px; color:#9CA3AF; display:flex; align-items:center;" id="admin-info"></div>
    </div>
  </div>

  <div class="page-footer" id="copyright"></div>

  <!-- 계정신청 모달 -->
  <div class="modal-overlay" id="modal-create">
    <div class="modal">
      <div class="modal-header"><h3>암호 생성</h3></div>
      <div class="modal-body">
        <p class="modal-desc">관리자 승인 후 로그인이 가능합니다.</p>
        <div class="field-group">
          <label>사원명</label>
          <input type="text" id="create-name" placeholder="실명 입력" autocomplete="off">
        </div>
        <div class="field-group">
          <label>암호</label>
          <input type="password" id="create-pw1" placeholder="4자 이상">
        </div>
        <div class="field-group">
          <label>암호확인</label>
          <input type="password" id="create-pw2" placeholder="암호 재입력" onkeydown="엔터계정신청(event)">
        </div>
        <div class="error-msg" id="create-error"></div>
        <div class="pending-box" id="pending-box">
          <p>암호 생성이 완료되었습니다.<br>관리자 승인 후 로그인해주세요.</p>
          <div class="modal-btns" style="padding:14px 0 0;">
            <button class="btn-confirm" onclick="모달닫기('modal-create')">확인</button>
          </div>
        </div>
      </div>
      <div class="modal-btns" id="create-btns">
        <button class="btn-confirm" id="btn-create-submit" onclick="계정신청제출()">생성</button>
        <button class="btn-close-modal" onclick="모달닫기('modal-create')">취소</button>
      </div>
    </div>
  </div>

  <!-- 암호변경 모달 -->
  <div class="modal-overlay" id="modal-change">
    <div class="modal">
      <div class="modal-header"><h3>암호 변경</h3></div>
      <div class="modal-body">
        <p class="modal-desc">현재 암호 확인 후 변경됩니다.</p>
        <div class="field-group">
          <label>사원명</label>
          <input type="text" id="change-name" placeholder="사원명 입력">
        </div>
        <div class="field-group">
          <label>현재 암호</label>
          <input type="password" id="change-old" placeholder="현재 암호">
        </div>
        <div class="field-group">
          <label>새 암호</label>
          <input type="password" id="change-new1" placeholder="새 암호 (4자 이상)">
        </div>
        <div class="field-group">
          <label>암호확인</label>
          <input type="password" id="change-new2" placeholder="새 암호 재입력" onkeydown="엔터암호변경(event)">
        </div>
        <div class="error-msg" id="change-error"></div>
      </div>
      <div class="modal-btns">
        <button class="btn-confirm" id="btn-change-submit" onclick="암호변경()">변경</button>
        <button class="btn-close-modal" onclick="모달닫기('modal-change')">취소</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.getElementById('brand-main').innerHTML = APP_CONFIG.시스템명.replace('ERP', '<span>ERP</span>');
    document.getElementById('brand-sub').textContent = APP_CONFIG.부제;
    document.getElementById('company-name').textContent = APP_CONFIG.회사명;
    document.getElementById('admin-info').textContent = '관리자: ' + APP_CONFIG.관리자;
    document.getElementById('copyright').textContent = 'Copyright © ' + APP_CONFIG.회사명 + '. All Rights Reserved.  |  ' + APP_CONFIG.버전;
    document.title = APP_CONFIG.시스템명 + ' - 로그인';

    if (현재세션()) location.href = 'main.html';

    function 에러표시(메시지) {
      document.getElementById('error-msg').textContent = 메시지;
    }

    function 엔터로그인(e) { if (e.key === 'Enter') 로그인(); }

    async function 로그인() {
      var 이름 = document.getElementById('inp-name').value.trim();
      var 암호 = document.getElementById('inp-pw').value;

      if (!이름) { 에러표시('사원명을 입력해주세요.'); return; }
      if (!암호) { 에러표시('사원암호를 입력해주세요.'); return; }

      var btn = document.getElementById('btn-login');
      btn.disabled = true;
      btn.textContent = '확인 중...';
      에러표시('');

      var 결과 = await 로그인시도(이름, 암호);
      btn.disabled = false;
      btn.textContent = '로 그 인';

      if (!결과.성공) { 에러표시(결과.메시지); return; }

      로그인처리(결과.사용자);
      location.href = 결과.사용자['관리자여부'] ? 'admin.html' : 'main.html';
    }

    function 초기화() {
      document.getElementById('inp-name').value = '';
      document.getElementById('inp-pw').value = '';
      에러표시('');
      document.getElementById('inp-name').focus();
    }

    function 계정신청모달열기() {
      document.getElementById('create-name').value = '';
      document.getElementById('create-pw1').value  = '';
      document.getElementById('create-pw2').value  = '';
      document.getElementById('create-error').textContent = '';
      document.getElementById('pending-box').style.display = 'none';
      document.getElementById('create-btns').style.display = 'flex';
      document.getElementById('modal-create').classList.add('active');
      document.getElementById('create-name').focus();
    }

    function 암호변경모달열기() {
      document.getElementById('change-name').value  = '';
      document.getElementById('change-old').value   = '';
      document.getElementById('change-new1').value  = '';
      document.getElementById('change-new2').value  = '';
      document.getElementById('change-error').textContent = '';
      document.getElementById('modal-change').classList.add('active');
      document.getElementById('change-name').focus();
    }

    function 모달닫기(id) {
      document.getElementById(id).classList.remove('active');
    }

    document.addEventListener('keydown', function(e) {
      if (e.key !== 'Escape') return;
      ['modal-create', 'modal-change'].forEach(function(id) {
        document.getElementById(id).classList.remove('active');
      });
    });

    function 엔터계정신청(e) { if (e.key === 'Enter') 계정신청제출(); }
    function 엔터암호변경(e)  { if (e.key === 'Enter') 암호변경(); }

    async function 계정신청제출() {
      var 이름  = document.getElementById('create-name').value.trim();
      var pw1   = document.getElementById('create-pw1').value;
      var pw2   = document.getElementById('create-pw2').value;
      var 에러  = document.getElementById('create-error');

      if (!이름) { 에러.textContent = '사원명을 입력해주세요.'; return; }
      if (!pw1 || pw1.length < 4) { 에러.textContent = '암호는 4자 이상 입력해주세요.'; return; }
      if (pw1 !== pw2) { 에러.textContent = '암호가 일치하지 않습니다.'; return; }

      var btn = document.getElementById('btn-create-submit');
      btn.disabled = true;
      btn.textContent = '생성 중...';
      에러.textContent = '';

      var 결과 = await 계정신청(이름, pw1);
      btn.disabled = false;
      btn.textContent = '생성';

      if (!결과.성공) { 에러.textContent = 결과.메시지; return; }

      document.getElementById('create-btns').style.display = 'none';
      document.getElementById('pending-box').style.display = 'block';
    }

    async function 암호변경() {
      var 이름    = document.getElementById('change-name').value.trim();
      var 현재암호 = document.getElementById('change-old').value;
      var pw1     = document.getElementById('change-new1').value;
      var pw2     = document.getElementById('change-new2').value;
      var 에러    = document.getElementById('change-error');

      if (!이름)    { 에러.textContent = '사원명을 입력해주세요.'; return; }
      if (!현재암호) { 에러.textContent = '현재 암호를 입력해주세요.'; return; }
      if (!pw1 || pw1.length < 4) { 에러.textContent = '새 암호는 4자 이상이어야 합니다.'; return; }
      if (pw1 !== pw2) { 에러.textContent = '새 암호가 일치하지 않습니다.'; return; }

      var btn = document.getElementById('btn-change-submit');
      btn.disabled = true;
      btn.textContent = '변경 중...';
      에러.textContent = '';

      var 결과 = await 암호변경처리(이름, 현재암호, pw1);
      btn.disabled = false;
      btn.textContent = '변경';

      if (!결과.성공) { 에러.textContent = 결과.메시지; return; }

      모달닫기('modal-change');
      에러표시('암호가 변경되었습니다.');
    }
  </script>
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
</html>
