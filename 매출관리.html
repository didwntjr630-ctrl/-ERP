<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>삼양ERP - 매출관리</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1a3a5c">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .필터행 {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .필터행 label { font-size: 12px; color: #2a6496; font-weight: bold; }
    .필터행 input, .필터행 select {
      border: 1px solid #c0cfe0;
      border-radius: 3px;
      padding: 5px 8px;
      font-size: 13px;
      font-family: inherit;
      height: 30px;
    }
    .매출합계 {
      display: flex;
      gap: 20px;
      background: #eaf3fb;
      border: 1px solid #b8d4ea;
      border-radius: 6px;
      padding: 10px 20px;
      margin-bottom: 14px;
      font-size: 13px;
    }
    .합계항목 { display: flex; flex-direction: column; gap: 2px; }
    .합계항목 .합계라벨 { font-size: 11px; color: #666; }
    .합계항목 .합계값 { font-size: 18px; font-weight: bold; color: #1a4a7a; }
  </style>
</head>
<body>

  <!-- 사이드바 -->
  <div class="사이드바오버레이" id="사이드바오버레이" onclick="사이드바닫기()"></div>
  <div class="사이드바" id="사이드바">
    <div class="사이드바헤더"><span>접속 현황</span><button onclick="사이드바닫기()">✕</button></div>
    <div class="사이드바섹션제목">현재 접속자</div>
    <div id="접속자목록"></div>
  </div>

  <!-- 상단 메뉴바 -->
  <div class="메뉴바">
    <div class="햄버거뱃지래퍼">
      <button class="햄버거버튼" onclick="사이드바열기()" title="접속자 현황">
        <span></span><span></span><span></span>
      </button>
      <span id="접속자수뱃지"></span>
    </div>
    <a href="main.html" class="회사명">
      <span class="회사명_메인" id="시스템명"></span>
      <span class="회사명_부제" id="부제"></span>
    </a>
    <nav>
      <a class="비활성">매입 관리</a>
      <a class="활성">매출 관리</a>
      <a class="비활성">거래처 관리</a>
      <a class="비활성">인사 관리</a>
      <a class="비활성">손익 현황</a>
    </nav>
    <div class="우측정보">
      <span class="사용자명" id="user-info"></span>
      <button onclick="로그아웃()">로그아웃</button>
    </div>
  </div>

  <div class="내용영역">
    <div id="알림박스" class="알림" style="position:fixed; top:24px; left:50%; transform:translateX(-50%); z-index:9999; min-width:260px; text-align:center; box-shadow:0 4px 16px rgba(0,0,0,0.15); font-size:14px; font-weight:600;"></div>
    <div id="확인모달_오버레이" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:9999; align-items:center; justify-content:center;">
      <div style="background:#fff; border-radius:8px; padding:24px; min-width:280px; max-width:400px; box-shadow:0 4px 20px rgba(0,0,0,0.3);">
        <div id="확인모달_메시지" style="margin-bottom:20px; font-size:14px; line-height:1.6; white-space:pre-line;"></div>
        <div style="display:flex; gap:8px; justify-content:flex-end;">
          <button class="버튼 회색" onclick="확인모달닫기()">취소</button>
          <button class="버튼 파랑" id="확인모달_확인버튼">확인</button>
        </div>
      </div>
    </div>

    <!-- 검색 카드 -->
    <div class="카드 검색카드">
      <div class="검색카드제목">매출 조회</div>
      <div class="검색행">

        <div class="검색항목 검색항목_기간">
          <label>조회 기간</label>
          <div class="기간입력행">
            <input type="date" id="검색_시작일">
            <span class="기간구분">~</span>
            <input type="date" id="검색_종료일">
          </div>
        </div>

        <div class="검색항목" style="flex:1;">
          <label>품명 / 품번</label>
          <div class="검색입력행">
            <input type="text" id="검색_품명" placeholder="품명 또는 품번" onkeydown="if(event.key==='Enter') 검색조회()">
            <button class="돋보기버튼 검색용" onclick="검색_품목팝업열기()" title="품목 조회"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button>
          </div>
        </div>

        <div class="검색항목" style="flex:0 0 180px;">
          <label>납품처</label>
          <div class="검색입력행">
            <input type="text" id="검색_납품처" placeholder="전체" onkeydown="if(event.key==='Enter') 검색조회()">
            <button class="돋보기버튼 검색용" onclick="납품처팝업열기()" title="납품처 조회"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button>
          </div>
        </div>

      </div>
      <div style="display:flex; justify-content:flex-end; gap:8px; margin-top:10px;">
        <button class="버튼 파랑" onclick="검색조회()">조회</button>
        <button class="버튼 회색" onclick="전체초기화()">전체보기</button>
      </div>
      <div id="검색결과안내" class="검색결과안내"></div>
    </div>

    <!-- 매출 목록 카드 -->
    <div class="카드">
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;">
        <div class="페이지제목" style="font-size:15px; margin-bottom:0;">매출 목록</div>
        <button class="버튼 노랑" onclick="단가수정팝업열기()">단가 수정</button>
      </div>

      <!-- 합계 -->
      <div class="매출합계">
        <div class="합계항목">
          <span class="합계라벨">총 건수</span>
          <span class="합계값" id="합계건수">0</span>
        </div>
        <div class="합계항목">
          <span class="합계라벨">총 수량</span>
          <span class="합계값" id="합계수량">0 EA</span>
        </div>
        <div class="합계항목">
          <span class="합계라벨">총 공급가액</span>
          <span class="합계값" id="합계공급가액" style="font-size:15px;">0 원</span>
        </div>
        <div class="합계항목">
          <span class="합계라벨">VAT포함 합계</span>
          <span class="합계값" id="합계VAT포함" style="font-size:15px; color:#e74c3c;">0 원</span>
        </div>
      </div>

      <!-- 목록 테이블 -->
      <div class="테이블감싸기 스크롤" style="max-height:520px;">
        <table>
          <thead>
            <tr>
              <th>출고일자</th>
              <th>품명</th>
              <th>완료공정</th>
              <th>규격</th>
              <th>단가</th>
              <th>수량</th>
              <th>공급가액</th>
              <th>VAT포함 금액</th>
              <th>조치</th>
            </tr>
          </thead>
          <tbody id="매출테이블바디">
            <tr><td colspan="8" class="빈목록안내">데이터를 불러오는 중...</td></tr>
          </tbody>
        </table>
      </div>
      <div style="display:flex; justify-content:flex-end; align-items:center; gap:8px; margin-top:12px;">
        <button class="버튼 초록" style="padding:0 18px; height:34px; font-size:13px;" onclick="거래내역서출력()">엑셀 출력</button>
        <select id="메일수신처선택" style="height:34px; padding:0 10px; font-size:13px; border:1px solid #c0cfe0; border-radius:4px; font-family:inherit;"></select>
        <button class="버튼 파랑" style="padding:0 18px; height:34px; font-size:13px;" onclick="매출메일발송()">메일 발송</button>
      </div>
    </div>

    <!-- 수기 항목 카드 -->
    <div class="카드" style="margin-top:16px;">
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;">
        <div class="페이지제목" style="font-size:15px; margin-bottom:0;">수기 항목 <span style="font-size:12px; color:#888; font-weight:normal;">(운송료·클레임 등 — 엑셀 출력에 반영됩니다)</span></div>
        <button class="버튼 파랑" style="height:30px; padding:0 14px; font-size:13px;" onclick="수기항목추가()">+ 항목 추가</button>
      </div>
      <div class="테이블감싸기">
        <table id="수기항목테이블">
          <thead>
            <tr>
              <th style="width:120px;">년월</th>
              <th>내용</th>
              <th style="width:150px;">금액 (원, 클레임은 -)</th>
              <th style="width:50px;">삭제</th>
            </tr>
          </thead>
          <tbody id="수기항목테이블바디">
            <tr><td colspan="4" class="빈목록안내">항목 추가 버튼으로 운송료·클레임 등을 입력하세요.</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- 단가 수정 팝업 -->
  <div id="단가수정_오버레이" class="팝업오버레이" style="display:none;" onclick="if(event.target===this) 단가수정팝업닫기()">
    <div class="팝업창" style="max-width:480px; max-height:85vh; display:flex; flex-direction:column;">
      <div class="팝업헤더">
        <span>단가 수정</span>
        <button class="팝업닫기버튼" onclick="단가수정팝업닫기()">✕</button>
      </div>
      <div class="팝업내용" style="padding:16px; flex:1; overflow-y:auto; min-height:0;">
        <div class="팝업테이블감싸기" style="max-height:none;">
          <table>
            <thead>
              <tr>
                <th>품번</th>
                <th>품명</th>
                <th>단가 (원)</th>
              </tr>
            </thead>
            <tbody id="단가수정_테이블바디"></tbody>
          </table>
        </div>
      </div>
      <div class="팝업하단">
        <button class="버튼 초록" onclick="단가저장()">저장</button>
        <button class="버튼 회색" onclick="단가수정팝업닫기()">취소</button>
      </div>
    </div>
  </div>

  <!-- 공용 조회 팝업 -->
  <div id="조회팝업_오버레이" class="팝업오버레이" style="display:none;" onclick="팝업배경클릭(event)" oncontextmenu="return false">
    <div class="팝업창">
      <div class="팝업헤더">
        <span id="조회팝업_제목">조회</span>
        <button class="팝업닫기버튼" onclick="조회팝업닫기()">✕</button>
      </div>
      <div class="팝업내용">
        <input type="text" id="조회팝업_검색" class="팝업검색입력" placeholder="검색..." oninput="조회팝업검색필터()">
        <div class="팝업테이블감싸기">
          <table>
            <thead><tr id="조회팝업_헤더행"></tr></thead>
            <tbody id="조회팝업_테이블바디"></tbody>
          </table>
        </div>
      </div>
      <div class="팝업하단">
        <button class="버튼 회색" onclick="조회팝업닫기()">닫기</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/presence.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/거래내역서.js"></script>
  <script>
    세션체크();
    접속자패널초기화();
    채팅초기화();
    document.getElementById('시스템명').textContent = APP_CONFIG.시스템명;
    document.getElementById('부제').textContent = APP_CONFIG.부제;
    document.title = APP_CONFIG.시스템명 + ' - 매출관리';
    var 세션 = 현재세션();
    if (세션) document.getElementById('user-info').textContent = 세션.직급 + ' ' + 세션.사원명;

    var 전체데이터 = [];

    /* ── 공용 조회 팝업 ── */
    var 현재팝업설정  = null;
    var 원본팝업데이터 = [];
    var 현재팝업필터데이터 = [];
    var 현재선택행인덱스 = -1;

    function 조회팝업키보드핸들러(e) {
      var 행목록 = document.querySelectorAll('#조회팝업_테이블바디 tr');
      if (!행목록.length) return;
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        현재선택행인덱스 = Math.min(현재선택행인덱스 + 1, 행목록.length - 1);
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        현재선택행인덱스 = Math.max(현재선택행인덱스 - 1, 0);
      } else if (e.key === 'Enter') {
        e.preventDefault();
        if (현재선택행인덱스 >= 0 && 현재선택행인덱스 < 현재팝업필터데이터.length) {
          var 항목 = 현재팝업필터데이터[현재선택행인덱스];
          현재팝업설정.선택시(항목);
          조회팝업닫기();
        }
        return;
      } else { return; }
      행목록.forEach(function(행, i) {
        행.classList.toggle('팝업행키보드선택', i === 현재선택행인덱스);
      });
      if (행목록[현재선택행인덱스]) {
        행목록[현재선택행인덱스].scrollIntoView({ block: 'nearest' });
      }
    }

    function 조회팝업열기(설정) {
      현재팝업설정   = 설정;
      원본팝업데이터 = 설정.데이터;
      현재선택행인덱스 = -1;
      document.getElementById('조회팝업_제목').textContent = 설정.제목;
      var 검색입력 = document.getElementById('조회팝업_검색');
      검색입력.value = '';
      검색입력.placeholder = 설정.검색힌트 || '검색...';
      검색입력.removeEventListener('keydown', 조회팝업키보드핸들러);
      검색입력.addEventListener('keydown', 조회팝업키보드핸들러);
      var 헤더 = document.getElementById('조회팝업_헤더행');
      헤더.innerHTML = '<th style="width:36px;"></th>';
      설정.열목록.forEach(function(열) {
        var th = document.createElement('th'); th.textContent = 열.제목; 헤더.appendChild(th);
      });
      조회팝업테이블채우기(원본팝업데이터);
      document.getElementById('조회팝업_오버레이').style.display = 'flex';
      setTimeout(function() { 검색입력.focus(); }, 50);
    }

    function 조회팝업닫기() { document.getElementById('조회팝업_오버레이').style.display = 'none'; }

    function 팝업배경클릭(e) {
      if (e.target === document.getElementById('조회팝업_오버레이')) 조회팝업닫기();
    }

    function 조회팝업검색필터() {
      var 검색어 = document.getElementById('조회팝업_검색').value.trim().toLowerCase();
      if (!검색어) { 조회팝업테이블채우기(원본팝업데이터); return; }
      var 결과 = 원본팝업데이터.filter(function(항목) {
        return 현재팝업설정.열목록.some(function(열) {
          return String(항목[열.필드]||'').toLowerCase().includes(검색어);
        });
      });
      조회팝업테이블채우기(결과);
    }

    function 조회팝업테이블채우기(목록) {
      현재팝업필터데이터 = 목록;
      현재선택행인덱스 = -1;
      var 바디 = document.getElementById('조회팝업_테이블바디');
      바디.innerHTML = '';
      if (목록.length === 0) {
        var 열수 = (현재팝업설정 ? 현재팝업설정.열목록.length : 3) + 1;
        바디.innerHTML = '<tr><td colspan="' + 열수 + '" class="빈목록안내">검색 결과가 없습니다.</td></tr>';
        return;
      }
      목록.forEach(function(항목) {
        var 행 = document.createElement('tr');
        var 체크td = document.createElement('td');
        var 체크 = document.createElement('input'); 체크.type = 'checkbox';
        체크td.appendChild(체크); 행.appendChild(체크td);
        현재팝업설정.열목록.forEach(function(열) {
          var td = document.createElement('td');
          td.textContent = 항목[열.필드] !== undefined ? 항목[열.필드] : '';
          행.appendChild(td);
        });
        행.addEventListener('click', function() {
          document.querySelectorAll('#조회팝업_테이블바디 input[type=checkbox]').forEach(function(c) { c.checked = false; });
          document.querySelectorAll('#조회팝업_테이블바디 tr').forEach(function(r) { r.classList.remove('팝업선택행'); });
          체크.checked = true; 행.classList.add('팝업선택행');
          현재팝업설정.선택시(항목);
          조회팝업닫기();
        });
        바디.appendChild(행);
      });
    }

    async function 매출메일발송() {
      if (!APP_CONFIG.메일발송URL) {
        alert('메일발송 URL이 설정되지 않았습니다.\nconfig.js의 메일발송URL을 입력해주세요.');
        return;
      }
      var 목록 = 전체데이터;
      if (!목록 || 목록.length === 0) { alert('발송할 매출 데이터가 없습니다.'); return; }

      // 납품처별 그룹핑
      var 업체그룹 = {};
      목록.forEach(function(h) {
        var 업체 = h.도착공정 || '미분류';
        if (!업체그룹[업체]) 업체그룹[업체] = [];
        업체그룹[업체].push(h);
      });
      var 업체목록 = Object.keys(업체그룹).sort();

      var 전체수량 = 0, 전체공급 = 0;
      var 제목 = '[' + APP_CONFIG.회사명 + '] 매출 현황 (' + new Date().toLocaleDateString('ko-KR') + ')';
      var 본문 = APP_CONFIG.회사명 + ' 매출 현황\n';
      본문 += '========================================\n\n';

      업체목록.forEach(function(업체) {
        var 업체데이터 = 업체그룹[업체];
        var 품목집계 = {};
        업체데이터.forEach(function(h) {
          var 품목 = 품목목록.find(function(p) { return p.품명 === h.품명; });
          var 단가 = 품목 ? (품목.단가 || 0) : 0;
          var 수량 = Number(h.출고수량) || 0;
          if (!품목집계[h.품명]) 품목집계[h.품명] = { 수량: 0, 공급: 0, 단가: 단가 };
          품목집계[h.품명].수량 += 수량;
          품목집계[h.품명].공급 += 단가 * 수량;
        });

        var 소계수량 = 업체데이터.reduce(function(s, h) { return s + (Number(h.출고수량) || 0); }, 0);
        var 소계공급 = Object.values(품목집계).reduce(function(s, d) { return s + d.공급; }, 0);
        var 소계vat  = Math.round(소계공급 * 1.1);
        전체수량 += 소계수량;
        전체공급 += 소계공급;

        본문 += '▶ ' + 업체 + '\n';
        본문 += '  총 건수: ' + 업체데이터.length + '건  |  수량: ' + 소계수량.toLocaleString() + ' EA\n';
        본문 += '  공급가액: ' + 소계공급.toLocaleString() + '원  |  VAT포함: ' + 소계vat.toLocaleString() + '원\n';
        본문 += '  ----------------------------------------\n';
        var 순번 = 1;
        Object.keys(품목집계).sort().forEach(function(품명) {
          var d = 품목집계[품명];
          본문 += '  ' + 순번++ + '. ' + 품명 + '\n';
          본문 += '     단가: ' + d.단가.toLocaleString() + '원  |  수량: ' + d.수량.toLocaleString() + ' EA  |  공급가: ' + d.공급.toLocaleString() + '원\n';
        });
        본문 += '\n';
      });

      if (업체목록.length > 1) {
        var 전체vat = Math.round(전체공급 * 1.1);
        본문 += '========================================\n';
        본문 += '[ 전체 합계 ]\n';
        본문 += '  총 건수: ' + 목록.length + '건  |  총 수량: ' + 전체수량.toLocaleString() + ' EA\n';
        본문 += '  총 공급가액: ' + 전체공급.toLocaleString() + '원\n';
        본문 += '  VAT포함 합계: ' + 전체vat.toLocaleString() + '원\n';
        본문 += '========================================\n';
      }

      var 선택이메일 = document.getElementById('메일수신처선택').value;
      var 선택이름 = document.getElementById('메일수신처선택').options[document.getElementById('메일수신처선택').selectedIndex].text;

      fetch(APP_CONFIG.메일발송URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ to: 선택이메일, subject: 제목, body: 본문 })
      }).catch(function(err) {
        console.error('메일 발송 오류:', err);
      });

      알림표시('메일 발송 완료 → ' + 선택이름 + ' (' + 선택이메일 + ')', '성공');
    }

    function 확인모달표시(메시지, 콜백) {
      document.getElementById('확인모달_메시지').textContent = 메시지;
      var 버튼 = document.getElementById('확인모달_확인버튼');
      버튼.onclick = function() { 확인모달닫기(); 콜백(); };
      document.getElementById('확인모달_오버레이').style.display = 'flex';
    }

    function 확인모달닫기() {
      document.getElementById('확인모달_오버레이').style.display = 'none';
    }

    async function 매출삭제(id) {
      확인모달표시('이 매출 기록을 삭제하시겠습니까?', async function() {
        var { error } = await 수파베이스.from('매출기록').delete().eq('id', id);
        if (error) { 알림표시('삭제 실패: ' + error.message, '오류'); return; }
        전체데이터 = 전체데이터.filter(function(h) { return h.id !== id; });
        필터적용();
      });
    }

    /* ── 단가 관리 ── */
    var 단가저장소키 = 'erp_단가';

    function 저장된단가적용() {
      var 저장 = localStorage.getItem(단가저장소키);
      if (!저장) return;
      var 맵 = JSON.parse(저장);
      품목목록.forEach(function(p) {
        if (맵[p.품번] !== undefined) p.단가 = 맵[p.품번];
      });
    }

    function 단가수정팝업열기() {
      var 바디 = document.getElementById('단가수정_테이블바디');
      바디.innerHTML = '';
      품목목록.forEach(function(p) {
        var 행 = document.createElement('tr');
        행.innerHTML =
          '<td style="color:#666;">' + p.품번 + '</td>' +
          '<td style="text-align:left;">' + p.품명 + '</td>' +
          '<td><input type="number" data-품번="' + p.품번 + '" value="' + (p.단가 || 0) + '" min="0" ' +
            'style="width:100px; text-align:right; border:1px solid #c0cfe0; border-radius:3px; padding:4px 8px; font-size:13px; font-family:inherit;"></td>';
        바디.appendChild(행);
      });
      document.getElementById('단가수정_오버레이').style.display = 'flex';
    }

    function 단가수정팝업닫기() {
      document.getElementById('단가수정_오버레이').style.display = 'none';
    }

    function 단가저장() {
      var 맵 = {};
      document.querySelectorAll('#단가수정_테이블바디 input').forEach(function(input) {
        var 품번 = input.dataset.품번;
        var 단가 = Number(input.value) || 0;
        맵[품번] = 단가;
        var 품목 = 품목목록.find(function(p) { return p.품번 === 품번; });
        if (품목) 품목.단가 = 단가;
      });
      localStorage.setItem(단가저장소키, JSON.stringify(맵));
      단가수정팝업닫기();
      필터적용();
    }

    function 규격결정(품명) {
      var 규칙 = APP_CONFIG.매출고정값.규격규칙;
      for (var i = 0; i < 규칙.length; i++) {
        if ((품명 || '').toUpperCase().includes(규칙[i].품명포함)) return 규칙[i].규격;
      }
      return APP_CONFIG.매출고정값.규격기본;
    }

    function 납품처팝업열기() {
      조회팝업열기({
        제목: '납품처 조회',
        검색힌트: '업체명 또는 코드 검색...',
        데이터: APP_CONFIG.납품처목록,
        열목록: [{ 제목: '코드', 필드: '코드' }, { 제목: '업체명', 필드: '업체명' }],
        선택시: function(항목) {
          document.getElementById('검색_납품처').value = 항목.업체명;
          필터적용();
        }
      });
    }

    function 검색_품목팝업열기() {
      조회팝업열기({
        제목: '품목 조회',
        검색힌트: '품명 또는 품번 검색...',
        데이터: 품목목록,
        열목록: [{ 제목: '품번', 필드: '품번' }, { 제목: '품명', 필드: '품명' }, { 제목: '규격', 필드: '규격' }],
        선택시: function(항목) {
          document.getElementById('검색_품명').value = 항목.품명;
          필터적용();
        }
      });
    }

    function 날짜기본값() {
      var d = new Date();
      var y = d.getFullYear();
      var m = String(d.getMonth()+1).padStart(2,'0');
      var day = String(d.getDate()).padStart(2,'0');
      document.getElementById('검색_시작일').value = y + '-' + m + '-01';
      document.getElementById('검색_종료일').value = y + '-' + m + '-' + day;
    }

    function 필터적용() {
      var 시작 = document.getElementById('검색_시작일').value;
      var 종료 = document.getElementById('검색_종료일').value;
      var 품명 = document.getElementById('검색_품명').value.trim().toLowerCase();

      var 납품처 = document.getElementById('검색_납품처').value;

      var 결과 = 전체데이터.slice();
      if (시작) 결과 = 결과.filter(function(h) { return (h.출고일자||'') >= 시작; });
      if (종료) 결과 = 결과.filter(function(h) { return (h.출고일자||'') <= 종료; });
      if (품명) 결과 = 결과.filter(function(h) { return (h.품명||'').toLowerCase().includes(품명) || (h.품번||'').toLowerCase().includes(품명); });
      if (납품처) 결과 = 결과.filter(function(h) { return (h.도착공정||'').includes(납품처); });

      결과 = 결과.sort(function(a, b) { return b.id - a.id; });
      테이블그리기(결과);
    }

    function 검색조회() {
      필터적용();
    }

    function 전체초기화() {
      날짜기본값();
      document.getElementById('검색_품명').value = '';
      document.getElementById('검색_납품처').value = '';
      테이블그리기(전체데이터);
    }

    async function 데이터로드() {
      var { data, error } = await 수파베이스
        .from('매출기록')
        .select('*')
        .order('확정일시', { ascending: false });
      전체데이터 = error ? [] : (data || []);
      필터적용();
    }

    function 테이블그리기(목록) {
      var 바디 = document.getElementById('매출테이블바디');
      var 총수량 = 0;

      if (목록.length === 0) {
        바디.innerHTML = '<tr><td colspan="9" class="빈목록안내">데이터가 없습니다.</td></tr>';
        document.getElementById('합계건수').textContent = '0';
        document.getElementById('합계수량').textContent = '0 EA';
        document.getElementById('합계공급가액').textContent = '0 원';
        document.getElementById('합계VAT포함').textContent = '0 원';
        document.getElementById('검색결과안내').innerHTML = '검색 결과: <span class="결과강조">0건</span>';
        return;
      }

      바디.innerHTML = '';
      var 총공급가액 = 0, 총VAT포함 = 0;
      목록.forEach(function(항목) {
        var 수량 = Number(항목.출고수량) || 0;
        총수량 += 수량;
        var 품목 = 품목목록.find(function(p) { return p.품명 === 항목.품명; });
        var 단가 = 품목 ? (품목.단가 || 0) : 0;
        var 공급가액 = 단가 * 수량;
        var vat포함 = Math.round(공급가액 * 1.1);
        총공급가액 += 공급가액;
        총VAT포함  += vat포함;
        var 행 = document.createElement('tr');
        행.innerHTML =
          '<td>' + (항목.출고일자 || '') + '</td>' +
          '<td style="text-align:left;">' + (항목.품명 || '') + '</td>' +
          '<td style="color:#27ae60; font-weight:bold;">' + APP_CONFIG.매출고정값.완료공정 + '</td>' +
          '<td style="color:#666;">' + 규격결정(항목.품명) + '</td>' +
          '<td style="text-align:right;">' + 단가.toLocaleString() + ' 원</td>' +
          '<td style="font-weight:bold;">' + 수량.toLocaleString() + ' EA</td>' +
          '<td style="text-align:right;">' + 공급가액.toLocaleString() + ' 원</td>' +
          '<td style="font-weight:bold; color:#2a6496; text-align:right;">' + vat포함.toLocaleString() + ' 원</td>' +
          '<td style="text-align:center;"><button class="버튼 빨강 소형" onclick="매출삭제(' + 항목.id + ')">삭제</button></td>';
        바디.appendChild(행);
      });

      document.getElementById('합계건수').textContent = 목록.length + ' 건';
      document.getElementById('합계수량').textContent = 총수량.toLocaleString() + ' EA';
      document.getElementById('합계공급가액').textContent = 총공급가액.toLocaleString() + ' 원';
      document.getElementById('합계VAT포함').textContent = 총VAT포함.toLocaleString() + ' 원';
      document.getElementById('검색결과안내').innerHTML = '검색 결과: <span class="결과강조">' + 목록.length + '건</span>';
    }

    function 합계갱신() {
      var 총공급 = 0, 총VAT = 0;
      document.querySelectorAll('.공급가액입력').forEach(function(input) {
        var 공급 = Number(input.value) || 0;
        총공급 += 공급;
        총VAT  += Math.round(공급 * 1.1);
      });
      document.getElementById('합계공급가액').textContent = 총공급.toLocaleString() + ' 원';
      document.getElementById('합계VAT포함').textContent  = 총VAT.toLocaleString() + ' 원';
    }

    /* ── 수기 항목 관리 ── */
    var 수기항목키 = 'erp_수기항목';
    var 수기항목목록 = [];

    function 수기항목로드() {
      try { 수기항목목록 = JSON.parse(localStorage.getItem(수기항목키)) || []; }
      catch(e) { 수기항목목록 = []; }
      수기항목테이블그리기();
    }

    function 수기항목저장() {
      localStorage.setItem(수기항목키, JSON.stringify(수기항목목록));
    }

    function 수기항목추가() {
      수기항목목록.push({ 월: '', 내용: '', 금액: 0, 비고: '' });
      수기항목저장();
      수기항목테이블그리기();
      var 행들 = document.querySelectorAll('#수기항목테이블바디 tr');
      var 마지막행 = 행들[행들.length - 1];
      if (마지막행) { var 첫입력 = 마지막행.querySelector('input'); if (첫입력) 첫입력.focus(); }
    }

    function 수기항목삭제(i) {
      수기항목목록.splice(i, 1);
      수기항목저장();
      수기항목테이블그리기();
    }

    function 수기항목변경(i, field, value) {
      수기항목목록[i][field] = field === '금액' ? (Number(value) || 0) : value;
      수기항목저장();
    }

    function 수기항목테이블그리기() {
      var 바디 = document.getElementById('수기항목테이블바디');
      if (!수기항목목록.length) {
        바디.innerHTML = '<tr><td colspan="4" class="빈목록안내">항목 추가 버튼으로 운송료·클레임 등을 입력하세요.</td></tr>';
        return;
      }
      바디.innerHTML = '';
      수기항목목록.forEach(function(항목, i) {
        var 행 = document.createElement('tr');
        var 색 = 항목.금액 < 0 ? 'color:#e74c3c;' : '';
        행.innerHTML =
          '<td><input type="month" data-field="월" value="' + (항목.월||'') + '" ' +
            'style="width:110px;border:1px solid #c0cfe0;border-radius:3px;padding:3px 6px;font-size:13px;font-family:inherit;" ' +
            'onchange="수기항목변경(' + i + ',\'월\',this.value)"></td>' +
          '<td><input type="text" data-field="내용" value="' + (항목.내용||'') + '" placeholder="운송료 / 클레임 등" ' +
            'style="width:100%;border:1px solid #c0cfe0;border-radius:3px;padding:3px 6px;font-size:13px;font-family:inherit;" ' +
            'oninput="수기항목변경(' + i + ',\'내용\',this.value)"></td>' +
          '<td><input type="number" data-field="금액" value="' + (항목.금액||0) + '" ' +
            'style="width:130px;border:1px solid #c0cfe0;border-radius:3px;padding:3px 6px;font-size:13px;font-family:inherit;text-align:right;' + 색 + '" ' +
            'oninput="수기항목변경(' + i + ',\'금액\',this.value);this.style.color=Number(this.value)<0?\'#e74c3c\':\'\'"></td>' +
          '<td style="text-align:center;"><button class="버튼 빨강 소형" onclick="수기항목삭제(' + i + ')">삭제</button></td>';
        바디.appendChild(행);
      });
    }

    function 알림표시(메시지, 종류) {
      var el = document.getElementById('알림박스');
      el.textContent = 메시지;
      el.className = '알림 ' + 종류;
      el.style.display = 'block';
      setTimeout(function() { el.style.display = 'none'; }, 3500);
    }

    function 수신처옵션채우기() {
      var sel = document.getElementById('메일수신처선택');
      APP_CONFIG.수신처목록.forEach(function(항목) {
        var opt = document.createElement('option');
        opt.value = 항목.이메일;
        opt.textContent = 항목.이름;
        sel.appendChild(opt);
      });
    }

    날짜기본값();
    저장된단가적용();
    수신처옵션채우기();
    수기항목로드();
    데이터로드();

    document.addEventListener('keydown', function(e) {
      if (e.key !== 'Escape') return;
      if (document.getElementById('확인모달_오버레이').style.display !== 'none') { 확인모달닫기(); return; }
      if (document.getElementById('조회팝업_오버레이').style.display !== 'none') { 조회팝업닫기(); return; }
      if (document.getElementById('단가수정_오버레이').style.display !== 'none') { 단가수정팝업닫기(); return; }
    });
  </script>
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</body>
